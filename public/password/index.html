<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>随机密码生成器 | AI Build Lab</title>
    <meta
      name="description"
      content="在浏览器本地生成安全随机密码，可配置字符、排除易混淆字符、长度、数量和本地历史记录。"
    />
    <meta name="theme-color" content="#07111f" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://superstar1014.qzz.io/password/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="随机密码生成器 | AI Build Lab" />
    <meta
      property="og:description"
      content="使用浏览器安全随机数生成密码，数据不会离开当前设备。"
    />
    <meta property="og:url" content="https://superstar1014.qzz.io/password/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="随机密码生成器 | AI Build Lab" />
    <meta
      name="twitter:description"
      content="使用浏览器安全随机数生成密码，数据不会离开当前设备。"
    />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="sitemap" href="/sitemap.xml" type="application/xml" />
    <link rel="preload" href="/assets/password-page.20260710.css" as="style" />
    <link rel="modulepreload" href="/assets/password-tool-core.20260710.js" />
    <link rel="modulepreload" href="/assets/password-tool.20260710.js" />
    <link rel="stylesheet" href="/assets/password-page.20260710.css" />
    <link rel="stylesheet" href="/assets/tool-brand.20260710.css" />
  </head>
  <body>
    <a class="skip-link" href="#password-workbench">跳到密码生成工作区</a>
    <main class="password-shell" data-password-tool>
      <header class="tool-topbar">
        <a class="brand" href="/" aria-label="返回 AI Build Lab 首页">
          <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
            <rect width="48" height="48" rx="8" fill="#080D18" />
            <circle cx="24" cy="24" r="6.5" fill="#FFCC67" />
            <circle cx="24" cy="24" r="14.5" fill="none" stroke="#6ED6FF" stroke-width="2" />
            <circle cx="36" cy="20" r="2.6" fill="#7DE2B8" />
            <path
              d="M12 30C19 38 31 38 38 30"
              fill="none"
              stroke="#FF7F5F"
              stroke-width="2.2"
              stroke-linecap="round"
            />
          </svg>
          <span>
            <strong>AI Build Lab</strong>
            <small>个人开发实验室</small>
          </span>
        </a>
        <nav class="tool-nav" aria-label="工具导航">
          <a href="/">首页</a>
          <a href="/json/">JSON 格式化</a>
          <a aria-current="page" href="/password/">密码生成</a>
        </nav>
      </header>

      <section class="tool-title" aria-labelledby="password-title">
        <div class="title-copy">
          <div class="eyebrow">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="5" y="10" width="14" height="10" rx="2" />
              <path d="M8 10V7a4 4 0 0 1 8 0v3M12 14v2" />
            </svg>
            <span>Secure utility</span>
          </div>
          <h1 id="password-title">随机密码生成</h1>
          <p>自定义字符范围、排除易混淆字符，并一次生成多个密码。</p>
        </div>
        <div class="privacy-note">
          <span class="privacy-dot" aria-hidden="true"></span>
          <div>
            <strong>仅在本地生成</strong>
            <span>密码不会上传到服务器</span>
          </div>
        </div>
      </section>

      <section class="password-workbench" id="password-workbench" aria-label="随机密码生成器">
        <form class="settings-card" data-password-form novalidate>
          <div class="card-heading">
            <div>
              <span class="step-number">01</span>
              <h2>生成设置</h2>
            </div>
            <span class="card-caption">选择密码规则</span>
          </div>

          <fieldset class="setting-group">
            <legend>所用字符</legend>
            <div class="character-grid">
              <label class="choice-card">
                <input type="checkbox" data-character="lowercase" checked />
                <span class="choice-mark" aria-hidden="true"></span>
                <span><strong>a–z</strong><small>小写字母</small></span>
              </label>
              <label class="choice-card">
                <input type="checkbox" data-character="uppercase" checked />
                <span class="choice-mark" aria-hidden="true"></span>
                <span><strong>A–Z</strong><small>大写字母</small></span>
              </label>
              <label class="choice-card">
                <input type="checkbox" data-character="numbers" checked />
                <span class="choice-mark" aria-hidden="true"></span>
                <span><strong>0–9</strong><small>数字</small></span>
              </label>
              <label class="choice-card">
                <input type="checkbox" data-character="symbols" />
                <span class="choice-mark" aria-hidden="true"></span>
                <span><strong>!@#</strong><small>特殊字符</small></span>
              </label>
            </div>
          </fieldset>

          <fieldset class="setting-group exclusion-group">
            <legend>排除字符</legend>
            <label class="switch-row" for="password-exclude-enabled">
              <span>
                <strong>排除容易混淆的字符</strong>
                <small>例如数字 1、0 与字母 l、O</small>
              </span>
              <input
                id="password-exclude-enabled"
                type="checkbox"
                data-password-exclude-enabled
                checked
              />
              <span class="switch" aria-hidden="true"></span>
            </label>
            <label class="text-field" for="password-excluded">
              <span>要排除的字符</span>
              <input
                id="password-excluded"
                type="text"
                value="il1oO0"
                spellcheck="false"
                autocomplete="off"
                data-password-excluded
              />
            </label>
          </fieldset>

          <div class="setting-meta">
            <label for="password-length">
              <span>密码长度</span>
              <span class="select-wrap">
                <select id="password-length" data-password-length>
                  <option value="8">8 位</option>
                  <option value="12">12 位</option>
                  <option value="16" selected>16 位</option>
                  <option value="20">20 位</option>
                  <option value="24">24 位</option>
                  <option value="32">32 位</option>
                  <option value="48">48 位</option>
                  <option value="64">64 位</option>
                </select>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 9 5 5 5-5" /></svg>
              </span>
            </label>
            <label for="password-count">
              <span>密码数量</span>
              <span class="select-wrap">
                <select id="password-count" data-password-count>
                  <option value="1" selected>1 个</option>
                  <option value="3">3 个</option>
                  <option value="5">5 个</option>
                  <option value="10">10 个</option>
                  <option value="20">20 个</option>
                </select>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 9 5 5 5-5" /></svg>
              </span>
            </label>
          </div>

          <div class="strength-preview" data-password-strength>
            <span>预计强度</span>
            <div class="strength-track" aria-hidden="true"><span></span></div>
            <strong>强</strong>
            <small>约 95 bits</small>
          </div>

          <p class="form-error" data-password-error role="alert" hidden></p>
          <button class="generate-button" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1" />
              <circle cx="12" cy="12" r="3.2" />
            </svg>
            生成密码
          </button>
        </form>

        <section class="results-card" aria-labelledby="results-title">
          <div class="card-heading result-heading">
            <div>
              <span class="step-number">02</span>
              <h2 id="results-title">生成结果</h2>
            </div>
            <button class="text-button" type="button" data-copy-all hidden>复制全部</button>
          </div>

          <div class="results-body" data-password-results>
            <div class="empty-results">
              <svg viewBox="0 0 64 64" aria-hidden="true">
                <rect x="12" y="25" width="40" height="30" rx="7" />
                <path d="M21 25v-7a11 11 0 0 1 22 0v7M32 37v7" />
                <circle cx="32" cy="36" r="3" />
              </svg>
              <h3>准备生成安全密码</h3>
              <p>设置左侧规则，然后点击“生成密码”。</p>
            </div>
          </div>

          <div class="results-footer">
            <label class="history-consent">
              <input type="checkbox" data-password-history-enabled />
              <span class="choice-mark" aria-hidden="true"></span>
              <span>
                <strong>记录历史结果</strong>
                <small>仅保存在当前浏览器；共享设备上请勿开启</small>
              </span>
            </label>
          </div>
        </section>
      </section>

      <details class="history-panel" data-password-history>
        <summary>
          <span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5M12 7v5l3 2" />
            </svg>
            <strong>查看历史记录</strong>
            <small data-history-count>尚无记录</small>
          </span>
          <svg class="summary-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m7 9 5 5 5-5" /></svg>
        </summary>
        <div class="history-content">
          <div class="history-toolbar">
            <p>历史密码以明文保存在此浏览器的 localStorage 中。</p>
            <button class="danger-button" type="button" data-clear-history disabled>清空历史</button>
          </div>
          <div class="history-list" data-history-list>
            <p class="history-empty">开启“记录历史结果”后，新生成的密码会显示在这里。</p>
          </div>
        </div>
      </details>

      <p class="sr-only" data-password-announcement aria-live="polite"></p>
    </main>

    <script type="module" src="/assets/password-tool.20260710.js"></script>
  </body>
</html>
