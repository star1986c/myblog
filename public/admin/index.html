<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin | AI Build Lab</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#0f1720" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/admin.20260706.css" />
  </head>
  <body>
    <main class="admin-shell" data-admin-app>
      <aside class="sidebar">
        <a class="brand" href="/">AI Build Lab</a>
        <nav class="tabs" aria-label="Admin sections">
          <button class="tab is-active" type="button" data-tab="posts">文章</button>
          <button class="tab" type="button" data-tab="pages">页面</button>
          <button class="tab" type="button" data-tab="categories">分类</button>
          <button class="tab" type="button" data-tab="media">媒体</button>
        </nav>
        <button class="logout" type="button" data-logout hidden>退出</button>
      </aside>

      <section class="workspace">
        <form class="login-panel" data-login>
          <h1>后台登录</h1>
          <label>
            用户名
            <input name="username" autocomplete="username" required />
          </label>
          <label>
            密码
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary" type="submit">登录</button>
          <p class="message" data-login-message></p>
        </form>

        <section class="console" data-console hidden>
          <header class="toolbar">
            <div>
              <p data-section-label>文章</p>
              <h1 data-section-title>内容管理</h1>
            </div>
            <button class="primary" type="button" data-create>新建</button>
          </header>

          <section class="panel is-active" data-panel="posts">
            <div class="split">
              <div class="list" data-post-list></div>
              <form class="editor" data-post-form>
                <input name="id" type="hidden" />
                <label>
                  标题
                  <input name="title" required />
                </label>
                <label>
                  Slug
                  <input name="slug" />
                </label>
                <div class="row">
                  <label>
                    状态
                    <select name="status">
                      <option value="draft" selected>草稿</option>
                      <option value="published">已发布</option>
                    </select>
                  </label>
                  <label>
                    可见性
                    <select name="visibility">
                      <option value="private" selected>私有</option>
                      <option value="public">公开</option>
                    </select>
                  </label>
                </div>
                <label>
                  摘要
                  <input name="excerpt" />
                </label>
                <label>
                  正文
                  <textarea name="content" rows="14"></textarea>
                </label>
                <div class="row">
                  <label>
                    SEO 标题
                    <input name="seoTitle" />
                  </label>
                  <label>
                    SEO 描述
                    <input name="seoDescription" />
                  </label>
                </div>
                <div class="actions">
                  <button class="primary" type="submit">保存文章</button>
                  <button type="button" data-delete-post>删除</button>
                </div>
              </form>
            </div>
          </section>

          <section class="panel" data-panel="pages">
            <div class="split">
              <div class="list" data-page-list></div>
              <form class="editor" data-page-form>
                <input name="id" type="hidden" />
                <label>
                  标题
                  <input name="title" required />
                </label>
                <label>
                  Slug
                  <input name="slug" />
                </label>
                <div class="row">
                  <label>
                    状态
                    <select name="status">
                      <option value="draft" selected>草稿</option>
                      <option value="published">已发布</option>
                    </select>
                  </label>
                  <label>
                    可见性
                    <select name="visibility">
                      <option value="private" selected>私有</option>
                      <option value="public">公开</option>
                    </select>
                  </label>
                </div>
                <label>
                  摘要
                  <input name="excerpt" />
                </label>
                <label>
                  正文
                  <textarea name="content" rows="14"></textarea>
                </label>
                <div class="actions">
                  <button class="primary" type="submit">保存页面</button>
                  <button type="button" data-delete-page>删除</button>
                </div>
              </form>
            </div>
          </section>

          <section class="panel" data-panel="categories">
            <div class="split compact">
              <div class="list" data-category-list></div>
              <form class="editor" data-category-form>
                <input name="id" type="hidden" />
                <label>
                  名称
                  <input name="name" required />
                </label>
                <label>
                  Slug
                  <input name="slug" />
                </label>
                <label>
                  描述
                  <textarea name="description" rows="5"></textarea>
                </label>
                <div class="actions">
                  <button class="primary" type="submit">保存分类</button>
                  <button type="button" data-delete-category>删除</button>
                </div>
              </form>
            </div>
          </section>

          <section class="panel" data-panel="media">
            <form class="media-upload" data-media-form>
              <input name="file" type="file" accept="image/*" required />
              <input name="alt" placeholder="Alt" />
              <button class="primary" type="submit">上传</button>
            </form>
            <div class="media-grid" data-media-list></div>
          </section>
        </section>
      </section>
    </main>

    <script type="module" src="/assets/admin.20260706.js"></script>
  </body>
</html>
