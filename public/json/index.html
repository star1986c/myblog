<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JSON Formatter | AI Build Lab</title>
    <meta
      name="description"
      content="A local JSON formatter, minifier, validator, and tree viewer for AI Build Lab."
    />
    <meta name="theme-color" content="#080b12" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://superstar1014.qzz.io/json/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="JSON Formatter | AI Build Lab" />
    <meta
      property="og:description"
      content="Format, minify, validate, and inspect JSON locally in your browser."
    />
    <meta property="og:url" content="https://superstar1014.qzz.io/json/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="JSON Formatter | AI Build Lab" />
    <meta
      name="twitter:description"
      content="Format, minify, validate, and inspect JSON locally in your browser."
    />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="sitemap" href="/sitemap.xml" type="application/xml" />
    <link rel="preload" href="/assets/json-page.20260706.css" as="style" />
    <link rel="modulepreload" href="/assets/json-tool-core.20260706.js" />
    <link rel="modulepreload" href="/assets/json-tool.20260706.js" />
    <link rel="stylesheet" href="/assets/json-page.20260706.css" />
  </head>
  <body>
    <main class="tool-shell" data-json-tool>
      <header class="tool-topbar">
        <a class="brand" href="/" aria-label="Back to AI Build Lab home">
          <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
            <rect width="48" height="48" rx="8" fill="#080D18" />
            <circle cx="24" cy="24" r="6.5" fill="#FFCC67" />
            <circle cx="24" cy="24" r="14.5" fill="none" stroke="#6ED6FF" stroke-width="2" />
            <circle cx="36" cy="20" r="2.6" fill="#B8A2FF" />
            <path
              d="M12 30C19 38 31 38 38 30"
              fill="none"
              stroke="#FF7F5F"
              stroke-width="2.2"
              stroke-linecap="round"
            />
          </svg>
          <span>AI Build Lab</span>
        </a>
        <nav class="tool-nav" aria-label="Tool navigation">
          <a href="/">首页</a>
          <a aria-current="page" href="/json/">JSON 格式化</a>
        </nav>
      </header>

      <section class="tool-title" aria-labelledby="json-title">
        <div>
          <h1 id="json-title">JSON 格式化工具</h1>
          <p>粘贴 JSON 后可格式化、压缩、校验错误位置，并查看树形结构。数据只在当前浏览器处理。</p>
        </div>
        <div class="privacy-note">
          <span>Local only</span>
          <strong>不上传数据</strong>
        </div>
      </section>

      <section class="json-workbench" aria-label="JSON formatter workspace">
        <div class="json-panel editor-panel">
          <div class="panel-bar">
            <div>
              <strong>输入</strong>
              <span data-json-status>等待输入</span>
            </div>
            <button class="icon-button" type="button" data-json-action="sample" aria-label="载入示例 JSON">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 5h16M4 12h10M4 19h16" />
              </svg>
            </button>
          </div>
          <textarea
            id="json-input"
            class="json-textarea"
            spellcheck="false"
            placeholder='{"name":"AI Build Lab","tools":["format","minify","tree"]}'
          ></textarea>
          <div class="tool-actions" aria-label="JSON 操作">
            <button class="button primary" type="button" data-json-action="format">格式化</button>
            <button class="button" type="button" data-json-action="minify">压缩</button>
            <button class="button" type="button" data-json-action="clear">清空</button>
            <button class="button" type="button" data-json-action="copy">复制</button>
          </div>
        </div>

        <div class="viewer-grid">
          <section class="viewer-panel" aria-label="JSON tree viewer">
            <div class="viewer-title">视图</div>
            <div class="viewer-toolbar">
              <label class="search-label">
                查找:
                <input type="search" data-json-search autocomplete="off" />
              </label>
              <button type="button" data-json-action="search">GO!</button>
              <button type="button" data-json-action="next">↓ 下一个</button>
              <button type="button" data-json-action="previous">↑ 上一个</button>
              <button type="button" data-json-action="expand">全部展开</button>
              <button type="button" data-json-action="collapse">全部收缩</button>
              <a href="/">回到首页</a>
            </div>
            <div class="json-tree" data-json-tree aria-label="JSON tree">
              <div class="empty-view">格式化或粘贴有效 JSON 后会显示树形结构。</div>
            </div>
          </section>

          <section class="property-panel" aria-label="Selected JSON node properties">
            <div class="viewer-title">属性</div>
            <table class="property-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Value</th>
                </tr>
              </thead>
              <tbody data-json-properties>
                <tr>
                  <td colspan="2">请选择左侧节点。</td>
                </tr>
              </tbody>
            </table>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/json-tool.20260706.js"></script>
  </body>
</html>
